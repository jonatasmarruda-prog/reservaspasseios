<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirmação no ônibus – Trilha Morro da Mesa | 22 de fevereiro</title>
  <style>
    :root{
      --ok:#16a34a;
      --no:#dc2626;
      --bg:#0f2419;
      --card:#0b1a13;
      --text:#e5e7eb;
      --muted:#9ca3af;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Arial, sans-serif;
      background: linear-gradient(135deg, #0f2419, #0d3d4d);
      color:var(--text);
      min-height:100vh;
    }
    header{
      position:sticky; top:0; z-index:10;
      background: rgba(15,36,25,.9);
      backdrop-filter: blur(8px);
      padding:14px 16px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    h1{margin:0 0 6px 0; font-size:1.2rem}
    .stats{
      display:flex; gap:12px; flex-wrap:wrap;
      font-size:.9rem; color:var(--muted)
    }
    .stats b{color:#fff}
    main{padding:14px 12px 80px}
    .list{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
    }
    .item{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-radius:14px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      box-shadow: 0 10px 20px rgba(0,0,0,.25);
      transition: transform .1s ease, box-shadow .1s ease, border-color .1s ease;
    }
    .item:active{transform: translateY(1px)}
    .name{font-weight:600}
    .badge{
      min-width:110px;
      text-align:center;
      padding:8px 10px;
      border-radius:999px;
      font-weight:700;
      font-size:.8rem;
      letter-spacing:.02em;
      border:1px solid transparent;
    }
    .no{ background: rgba(220,38,38,.15); color:#fecaca; border-color: rgba(220,38,38,.35)}
    .ok{ background: rgba(22,163,74,.15); color:#bbf7d0; border-color: rgba(22,163,74,.35)}
    footer{
      position:fixed; left:0; right:0; bottom:0;
      background: rgba(11,26,19,.95);
      backdrop-filter: blur(8px);
      border-top:1px solid rgba(255,255,255,.08);
      padding:10px 12px;
      display:flex; gap:10px;
    }
    button{
      flex:1;
      padding:12px 14px;
      border-radius:12px;
      border:none;
      font-weight:800;
      letter-spacing:.04em;
      cursor:pointer;
      color:#052e16;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 8px 20px rgba(34,197,94,.35);
    }
    .reset{
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color:#fff;
      box-shadow: 0 8px 20px rgba(239,68,68,.35);
    }
    .hint{font-size:.75rem; color:var(--muted); margin-top:6px}
  </style>
</head>
<body>
  <header>
    <h1>🚌 Confirmação no ônibus – Trilha Morro da Mesa</h1>
    <div class="stats">
      <span>Confirmados: <b id="okCount">0</b></span>
      <span>Não confirmados: <b id="noCount">0</b></span>
      <span>Total: <b id="totalCount">0</b></span>
    </div>
    <div class="hint">Toque no nome para alternar o status.</div>
  </header>

  <main>
    <div id="list" class="list"></div>
  </main>

  <footer>
    <button id="exportBtn">Exportar confirmados</button>
    <button id="resetBtn" class="reset">Resetar tudo</button>
  </footer>

  <script>
    const nomes = [
      "Adriana Pereira Viana","Airton Junio","Ana","Ana Claudia Ribeiro","Aryele","Bruna Maia Fernandes",
      "Crislaine","Débora Stürmer","Edilane Leal Michiles da Silva","Edelson Santana de Almeida","Edna Andrade",
      "Elionaldo","Elizabete Tunes","Emelyn Padilha","Francieli","Gabriely Silveira",
      "Geovana Vitória Arruda Rodrigues","Gustavo","Higor Diogo","Hugo Deleon","Jakeline",
      "Jaylson Medeiros da Silva","Jefferson Araújo Alves","Jéssyca Fernandes de Oliveira Silva",
      "Jonatas Marcos","Kamila","Lavinia Barboza Inácio","Lediane","Luiz Eduardo Rezende Camara",
      "Maiara Alves da Silva Inocêncio","Márcia Campos de Oliveira","Marta Schorn","Míriam Pinto Moreira",
      "Natan de Araújo Gomes","Nelson Melo","Paula","Patrícia Dall Agnol","Raquel Gama Zaiatz",
      "Rafael Martins Michiles da Silva","Regina Mingareli","Renata","Robson Ferreira de Oliveira",
      "Roseli Batista","Ronaldo","Samuel Sousa","Sara Gama Zaiatz","Sassamoto","Selma",
      "Simone Maria Marques","Suely Aparecida","Thaiza Alves Gouveia",
      "Victoria Roberta Freitas dos Santos","Viviane Sousa de Oliveira"
    ];

    const key = "presenca_trilheiros_v1";
    const saved = JSON.parse(localStorage.getItem(key) || "{}");

    const list = document.getElementById("list");
    const okCount = document.getElementById("okCount");
    const noCount = document.getElementById("noCount");
    const totalCount = document.getElementById("totalCount");

    function render(){
      list.innerHTML = "";
      let ok = 0, no = 0;
      nomes.forEach((nome) => {
        const confirmed = !!saved[nome];
        if (confirmed) ok++; else no++;

        const item = document.createElement("div");
        item.className = "item";
        const name = document.createElement("div");
        name.className = "name";
        name.textContent = nome;

        const badge = document.createElement("div");
        badge.className = "badge " + (confirmed ? "ok" : "no");
        badge.textContent = confirmed ? "CONFIRMADO" : "NÃO CONFIRMADO";

        item.onclick = () => {
          saved[nome] = !saved[nome];
          localStorage.setItem(key, JSON.stringify(saved));
          render();
        };

        item.appendChild(name);
        item.appendChild(badge);
        list.appendChild(item);
      });

      okCount.textContent = ok;
      noCount.textContent = no;
      totalCount.textContent = nomes.length;
    }

    document.getElementById("resetBtn").onclick = () => {
      if (confirm("Tem certeza que deseja zerar todas as confirmações?")) {
        localStorage.removeItem(key);
        for (const k in saved) delete saved[k];
        render();
      }
    };

    document.getElementById("exportBtn").onclick = () => {
      const confirmados = nomes.filter(n => saved[n]);
      const texto = confirmados.join("\n");
      navigator.clipboard.writeText(texto).then(() => {
        alert("Lista de confirmados copiada para a área de transferência!");
      });
    };

    render();
  </script>
</body>
</html>
