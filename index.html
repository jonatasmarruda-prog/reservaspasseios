<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trilheiros de Rondonópolis</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
text-align:center;
}

header{
padding:40px 20px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
padding:30px;
}

.card{
background:#141414;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.7);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:20px;
}

button{
background:#00b894;
border:none;
padding:12px 25px;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
margin:6px;
}

button:hover{
background:#019875;
}

.section{
padding:40px 20px;
border-top:1px solid #333;
}

input{
width:60px;
padding:6px;
margin:6px;
}

.vagas{
color:#00e676;
font-weight:bold;
}

footer{
padding:30px;
font-size:14px;
color:#bbb;
}

.voltar{
margin-top:25px;
background:#444;
}

</style>

</head>

<body>

<header>

<h1>🌿 Trilheiros de Rondonópolis</h1>

<p>Escolha seu próximo destino e viva uma experiência incrível na natureza</p>

</header>

<section class="grid" id="inicio">

<div class="card">

<img src="https://i.postimg.cc/7YJ6Yp7c/Lagoa-Azul.png">

<div class="info">

<h2>Lagoa Azul</h2>

<p>📍 Primavera do Leste – MT</p>

<button onclick="mostrar('lagoa')">Ver detalhes</button>

</div>

</div>

<div class="card">

<img src="https://i.postimg.cc/4dJGZK5m/C%C3%B3pia_de_Red_and_White_Modern_Travel_Promotion_Instagram_Post.png">

<div class="info">

<h2>Vale do Chico</h2>

<p>📍 Jaciara – MT</p>

<button onclick="mostrar('chico')">Ver detalhes</button>

</div>

</div>

<div class="card">

<img src="https://i.postimg.cc/j2YtqL1j/Rafting_em_Jaciara_aventura_nas_%C3%A1guas.png">

<div class="info">

<h2>Rafting em Jaciara</h2>

<p>🌊 Rio Tenente Amaral</p>

<button onclick="mostrar('rafting')">Ver detalhes</button>

</div>

</div>

</section>

<div id="detalhes"></div>

<footer>

<p>Após realizar o pagamento envie o comprovante no WhatsApp.</p>

<p>WhatsApp: 66 99692-6174</p>

</footer>

<script>

let vagas = {
lagoa:28,
chico:28,
rafting:28
}

function copiarPix(){

navigator.clipboard.writeText("trilheiros.roomt@gmail.com")
alert("PIX copiada: trilheiros.roomt@gmail.com")

}

function voltar(){

document.getElementById("detalhes").innerHTML=""
document.getElementById("inicio").style.display="grid"

}

function mostrar(tipo){

document.getElementById("inicio").style.display="none"

let html=""

if(tipo==="lagoa"){

html=`

<section class="section">

<h2>💙 Lagoa Azul</h2>

<p class="vagas">Restam ${vagas.lagoa} vagas</p>

<p>

✔ Transporte ida e volta<br>
✔ Entrada no atrativo<br>
✔ Snorkel<br>
✔ Colete salva-vidas<br>
✔ Seguro de vida<br>
✔ Guia de turismo

</p>

<h3>Valores</h3>

<p>Adulto PIX: R$336</p>
<p>Adulto Cartão: R$340</p>
<p>Criança até 10 anos: R$280</p>
<p>Veículo próprio: R$215</p>

<h3>Calcular valor PIX</h3>

Adultos
<input id="adulto" type="number" value="1">

Crianças
<input id="crianca" type="number" value="0">

<br>

<button onclick="calcLagoa()">Calcular</button>

<p id="total"></p>

<button onclick="copiarPix()">Pagar com PIX</button>

<a href="https://mpago.li/2yrVFJQ">
<button>Cartão</button>
</a>

<br>

<a href="https://wa.me/5566996926174?text=Olá!%20Envio%20comprovante%20Lagoa%20Azul">
<button>Enviar comprovante</button>
</a>

<br>

<button class="voltar" onclick="voltar()">⬅ Voltar</button>

</section>

`

}

if(tipo==="chico"){

html=`

<section class="section">

<h2>🌿 Vale do Chico</h2>

<p class="vagas">Restam ${vagas.chico} vagas</p>

<p>

✔ Transporte<br>
✔ Café da manhã<br>
✔ Almoço<br>
✔ Seguro de vida

</p>

<h3>Valores</h3>

<p>Individual PIX: R$365</p>
<p>Cartão: R$379</p>
<p>Casal PIX: R$700</p>
<p>Cartão: R$729</p>
<p>Criança PIX: R$295</p>
<p>Cartão: R$309</p>

<h3>Calcular valor PIX</h3>

Adultos
<input id="adulto" type="number" value="1">

Crianças
<input id="crianca" type="number" value="0">

<br>

<button onclick="calcChico()">Calcular</button>

<p id="total"></p>

<button onclick="copiarPix()">Pagar com PIX</button>

<a href="https://mpago.li/2HA5tTm">
<button>Cartão</button>
</a>

<br>

<a href="https://wa.me/5566996926174?text=Olá!%20Envio%20comprovante%20Vale%20do%20Chico">
<button>Enviar comprovante</button>
</a>

<br>

<button class="voltar" onclick="voltar()">⬅ Voltar</button>

</section>

`

}

if(tipo==="rafting"){

html=`

<section class="section">

<h2>🌊 Rafting em Jaciara</h2>

<p class="vagas">Restam ${vagas.rafting} vagas</p>

<p>

✔ Transporte ida e volta<br>
✔ Equipamentos de segurança<br>
✔ Guia especializado<br>
✔ Seguro individual

</p>

<h3>Valores</h3>

<p>PIX: R$325</p>
<p>Cartão: R$335</p>

<button onclick="copiarPix()">Pagar com PIX</button>

<a href="https://mpago.li/33bGqHg">
<button>Cartão</button>
</a>

<br>

<a href="https://wa.me/5566996926174?text=Olá!%20Envio%20comprovante%20Rafting">
<button>Enviar comprovante</button>
</a>

<br>

<button class="voltar" onclick="voltar()">⬅ Voltar</button>

</section>

`

}

document.getElementById("detalhes").innerHTML = html

}

function calcLagoa(){

let a=document.getElementById("adulto").value
let c=document.getElementById("crianca").value

let total=(a*336)+(c*280)

document.getElementById("total").innerText="Total PIX: R$ "+total

}

function calcChico(){

let a=document.getElementById("adulto").value
let c=document.getElementById("crianca").value

let total=(a*365)+(c*295)

document.getElementById("total").innerText="Total PIX: R$ "+total

}

</script>

</body>
</html>
